<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador 3D - Bomba de Plutônio</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 100;
            border: 1px solid #00ffaa;
            box-shadow: 0 0 20px rgba(0,255,170,0.3);
            backdrop-filter: blur(5px);
            font-weight: 300;
            letter-spacing: 1px;
        }
        #info h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 400;
            color: #00ffaa;
        }
        #info p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            background: rgba(20,20,20,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #444;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>⚡ SIMULADOR DE BOMBA DE PLUTÔNIO ⚡</h1>
        <p>Modelo 3D conceitual | Arraste para rotacionar | Rolar para zoom</p>
    </div>
    <div id="controls-note">
        🖱️ Interaja com o modelo | Núcleo pulsante | Partículas de energia
    </div>

    <!-- Importação das bibliotecas Three.js e auxiliares via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Configuração inicial da cena, câmera e renderizadores ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20); // Azul escuro espacial
        
        // Adiciona uma leve névoa para profundidade
        scene.fog = new THREE.Fog(0x0a0a20, 20, 60);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 15);
        camera.lookAt(0, 0, 0);

        // Renderizador WebGL
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Habilita sombras para mais realismo
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Renderizador CSS2D para rótulos
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // Permite interagir com o modelo através dos rótulos
        document.body.appendChild(labelRenderer.domElement);

        // --- Controles de órbita ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2; // Limita para não ir abaixo do chão
        controls.target.set(0, 0, 0);

        // --- Iluminação ---
        
        // Luz ambiente suave
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal direcional (simula sol)
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 15;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 2;
        dirLight.shadow.camera.far = 30;
        scene.add(dirLight);

        // Luz de preenchimento traseira
        const backLight = new THREE.PointLight(0x446688, 0.5);
        backLight.position.set(-5, 0, -5);
        scene.add(backLight);

        // Luzes coloridas para dar destaque ao núcleo
        const coreLight1 = new THREE.PointLight(0x44aaff, 1.5, 10);
        coreLight1.position.set(2, 1, 2);
        scene.add(coreLight1);

        const coreLight2 = new THREE.PointLight(0xffaa44, 0.8, 10);
        coreLight2.position.set(-2, -1, -2);
        scene.add(coreLight2);

        // --- Criação do cenário base (chão e estrelas) ---
        
        // Chão com grade para referência
        const gridHelper = new THREE.GridHelper(30, 20, 0x88ccff, 0x335588);
        gridHelper.position.y = -2.5;
        scene.add(gridHelper);

        // Efeito de estrelas (partículas)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            // Distribuição esférica aleatória
            const r = 50 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Construção do modelo da bomba ---
        const bombGroup = new THREE.Group();
        bombGroup.position.set(0, 0, 0);

        // 1. Núcleo de plutônio (esfera brilhante)
        const coreGeo = new THREE.SphereGeometry(1.2, 64, 64);
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0x88aaff,
            emissive: 0x224488,
            roughness: 0.2,
            metalness: 0.8,
            emissiveIntensity: 1.2
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.castShadow = true;
        core.receiveShadow = true;
        bombGroup.add(core);

        // Adiciona um brilho interno com uma esfera semi-transparente
        const glowGeo = new THREE.SphereGeometry(1.3, 32, 32);
        const glowMat = new THREE.MeshStandardMaterial({
            color: 0x44aaff,
            emissive: 0x224488,
            transparent: true,
            opacity: 0.25,
            side: THREE.BackSide
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        bombGroup.add(glow);

        // 2. Lentes explosivas (representadas por um icosaedro wireframe e pequenos cubos nos vértices)
        const lensGeo = new THREE.IcosahedronGeometry(2.0, 1); // Subdividido uma vez para mais detalhes
        const lensMat = new THREE.MeshStandardMaterial({
            color: 0xffaa44,
            wireframe: true,
            emissive: 0x331100,
            transparent: true,
            opacity: 0.4
        });
        const lensWireframe = new THREE.Mesh(lensGeo, lensMat);
        lensWireframe.castShadow = false;
        lensWireframe.receiveShadow = false;
        bombGroup.add(lensWireframe);

        // Adiciona pequenos cubos nos vértices para simular os detonadores
        const vertices = [];
        const pos = lensGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            const z = pos.getZ(i);
            // Normaliza e multiplica pelo raio desejado (2.0) - já está ok
            vertices.push(new THREE.Vector3(x, y, z));
        }
        // Remove duplicatas aproximadas (simplificado - apenas alguns pontos)
        const detonatorMaterial = new THREE.MeshStandardMaterial({ color: 0xff5500, emissive: 0x441100 });
        for (let i = 0; i < Math.min(vertices.length, 30); i += 3) { // Limita para não poluir
            const detGeo = new THREE.BoxGeometry(0.2, 0.2, 0.3);
            const detMesh = new THREE.Mesh(detGeo, detonatorMaterial);
            detMesh.position.copy(vertices[i].clone().normalize().multiplyScalar(2.1));
            detMesh.castShadow = true;
            detMesh.receiveShadow = true;
            bombGroup.add(detMesh);
        }

        // 3. Carcaça externa (cilindro com extremidades arredondadas)
        const casingGroup = new THREE.Group();
        
        // Corpo cilíndrico
        const bodyGeo = new THREE.CylinderGeometry(2.4, 2.4, 4.5, 32, 1);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.4, metalness: 0.3, emissive: 0x111122 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2; // Deixa o cilindro na horizontal (eixo Z)
        body.castShadow = true;
        body.receiveShadow = true;
        casingGroup.add(body);

        // Extremidades (semi-esferas)
        const capGeo = new THREE.SphereGeometry(2.4, 32, 16);
        const capMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.4, metalness: 0.3 });

        const capFront = new THREE.Mesh(capGeo, capMat);
        capFront.position.z = 2.25;
        capFront.scale.set(1, 1, 0.5); // Achata para parecer uma ogiva
        capFront.castShadow = true;
        capFront.receiveShadow = true;
        casingGroup.add(capFront);

        const capBack = new THREE.Mesh(capGeo, capMat);
        capBack.position.z = -2.25;
        capBack.scale.set(1, 1, 0.5);
        capBack.castShadow = true;
        capBack.receiveShadow = true;
        casingGroup.add(capBack);

        // Anéis de reforço
        const ringGeo = new THREE.TorusGeometry(2.4, 0.1, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xaabbcc, roughness: 0.3, metalness: 0.6 });
        for (let i = -1; i <= 1; i+=2) {
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.y = Math.PI / 2;
            ring.position.z = i * 1.5;
            ring.castShadow = true;
            ring.receiveShadow = true;
            casingGroup.add(ring);
        }

        bombGroup.add(casingGroup);

        // 4. Aletas (estabilizadores) na parte traseira
        const finMaterial = new THREE.MeshStandardMaterial({ color: 0xaa5555, roughness: 0.5, emissive: 0x220000 });
        const finPositions = [
            { z: -2.8, rot: 0, x: 0, y: 1.2 },  // superior
            { z: -2.8, rot: 0, x: 0, y: -1.2 }, // inferior
            { z: -2.8, rot: Math.PI/2, x: 1.2, y: 0 }, // direita
            { z: -2.8, rot: Math.PI/2, x: -1.2, y: 0 } // esquerda
        ];
        finPositions.forEach(pos => {
            const finGeo = new THREE.BoxGeometry(0.8, 0.2, 1.5);
            const fin = new THREE.Mesh(finGeo, finMaterial);
            fin.position.set(pos.x, pos.y, pos.z);
            fin.rotation.z = pos.rot;
            fin.castShadow = true;
            fin.receiveShadow = true;
            bombGroup.add(fin);
        });

        // Adiciona o grupo da bomba à cena
        scene.add(bombGroup);

        // --- Partículas de energia ao redor da bomba ---
        const particleCount = 400;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // Distribuição em uma esfera de raio entre 3.5 e 5.0
            const r = 3.5 + Math.random() * 1.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = Math.sin(phi) * Math.cos(theta) * r;
            const y = Math.sin(phi) * Math.sin(theta) * r;
            const z = Math.cos(phi) * r;
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = y;
            particlePositions[i*3+2] = z;
            
            // Cores variando entre azul e laranja
            const color = new THREE.Color().lerpColors(new THREE.Color(0x44aaff), new THREE.Color(0xffaa44), Math.random());
            particleColors[i*3] = color.r;
            particleColors[i*3+1] = color.g;
            particleColors[i*3+2] = color.b;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        bombGroup.add(particles); // As partículas acompanham a bomba

        // --- Rótulos (CSS2D) para identificar componentes ---
        function createLabel(text, color, position) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = 'white';
            div.style.fontFamily = 'Segoe UI, sans-serif';
            div.style.fontSize = '18px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 3px black';
            div.style.background = `rgba(20, 40, 70, 0.8)`;
            div.style.border = `2px solid ${color}`;
            div.style.borderRadius = '12px';
            div.style.padding = '4px 12px';
            div.style.letterSpacing = '0.5px';
            div.style.backdropFilter = 'blur(4px)';
            div.style.boxShadow = '0 0 15px rgba(0,200,255,0.3)';
            const label = new CSS2DObject(div);
            label.position.copy(position);
            return label;
        }

        const labelCore = createLabel('⚛️ Núcleo de Plutônio', '#44aaff', new THREE.Vector3(0, 2.0, 1.5));
        bombGroup.add(labelCore);

        const labelLens = createLabel('💥 Lentes Explosivas', '#ffaa44', new THREE.Vector3(2.8, 1.2, 0));
        bombGroup.add(labelLens);

        const labelCasing = createLabel('🛡️ Carcaça de Proteção', '#88aaff', new THREE.Vector3(-1.5, -1.8, 2.0));
        bombGroup.add(labelCasing);

        const labelFins = createLabel('⚙️ Aletas Estabilizadoras', '#aa5555', new THREE.Vector3(0, -2.2, -3.0));
        bombGroup.add(labelFins);

        // --- Animações e efeitos extras ---
        
        // Pequena esfera giratória ao redor para simular detector/radar (estético)
        const orbGeo = new THREE.TorusGeometry(3.0, 0.05, 16, 100);
        const orbMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x114477 });
        const orb = new THREE.Mesh(orbGeo, orbMat);
        orb.rotation.x = Math.PI / 2;
        orb.rotation.z = 0.3;
        bombGroup.add(orb);

        const orb2 = new THREE.Mesh(orbGeo, orbMat);
        orb2.rotation.y = Math.PI / 2;
        orb2.rotation.x = 0.5;
        bombGroup.add(orb2);

        // --- Loop de animação ---
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // Auto-rotação controlada pelo OrbitControls já ativada

            // Pulsação suave do núcleo e luzes
            const pulse = 1.0 + Math.sin(elapsedTime * 3) * 0.03;
            core.scale.set(pulse, pulse, pulse);
            
            // Rotacionar partículas e anéis para dar dinamismo
            particles.rotation.y += 0.001;
            orb.rotation.z += 0.002;
            orb2.rotation.x += 0.0015;

            // Atualizar controles
            controls.update();

            // Renderizar
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);

            requestAnimationFrame(animate);
        }

        animate();

        // --- Ajuste de redimensionamento da janela ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
