<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☢️ HYDROGEN BOMB SIMULATOR 3000 ☢️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #0a0f0e 0%, #1a2a28 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            padding: 16px;
            margin: 0;
            transition: background-color 0.15s ease;
        }

        /* Efeito de flash da explosão */
        body.explode-flash {
            background-color: #fffbe6 !important;
            background: #fff0c0 !important;
            animation: flash 0.6s 2;
        }

        @keyframes flash {
            0% { background-color: #fff0c0; }
            50% { background-color: #fffff0; }
            100% { background-color: #fff0c0; }
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #1e2b2a;
            background-image: radial-gradient(circle at 30% 20%, #2f4f4e, #152221);
            border: 6px solid #5f7f7b;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px #2e4b48;
            padding: 30px 25px;
            color: #b3ffe0;
            text-shadow: 0 0 5px #00cc99, 0 0 12px #009977;
            position: relative;
            transition: all 0.2s;
        }

        /* Efeito de cintilação de painel antigo */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            background: repeating-linear-gradient(0deg, rgba(0,50,30,0.1) 0px, rgba(0,255,200,0.03) 2px, transparent 3px, transparent 5px);
            pointer-events: none;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 25px;
            color: #ffd966;
            text-shadow: 0 0 10px #ffb347, 0 0 20px #ff8c00, 0 0 30px #ff5700;
            word-break: break-word;
            border-bottom: 2px solid #ffae42;
            padding-bottom: 15px;
        }

        .panel {
            background: #0e1f1c;
            border: 4px solid #2f6b64;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: inset 0 0 30px #000000, 0 10px 10px rgba(0,0,0,0.5);
        }

        .yield-selector, .target-selector {
            margin-bottom: 25px;
            background: #1d3a36;
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid #4f9e94;
            box-shadow: inset 0 2px 8px black;
        }

        .yield-selector label, .target-selector label {
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #ffdb9f;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #yield-value {
            background: black;
            padding: 4px 12px;
            border-radius: 40px;
            border: 2px solid #adff2f;
            color: #adff2f;
            font-weight: bold;
        }

        input[type=range] {
            width: 100%;
            margin: 10px 0;
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 20px;
            background: #152b28;
            border: 2px solid #57b5a8;
            border-radius: 20px;
            box-shadow: inset 0 1px 5px black;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 34px;
            width: 34px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc66, #ff9900);
            border: 3px solid #ffffc0;
            margin-top: -8px;
            box-shadow: 0 0 20px #ffaa33;
            cursor: grab;
        }
        input[type=range]::-moz-range-track {
            height: 20px;
            background: #152b28;
            border: 2px solid #57b5a8;
            border-radius: 20px;
        }
        input[type=range]::-moz-range-thumb {
            height: 34px;
            width: 34px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc66, #ff9900);
            border: 3px solid #ffffc0;
            box-shadow: 0 0 20px #ffaa33;
            cursor: grab;
        }

        select {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            background: #03100e;
            color: #a2f2d9;
            border: 3px solid #7fe0d0;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: inset 0 0 15px black, 0 0 15px #00cc99;
            cursor: pointer;
        }
        select option {
            background: #152f2b;
        }

        .status {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background: #102b27;
            padding: 20px;
            border-radius: 40px;
            margin: 20px 0;
            border: 3px solid #50b7a8;
            font-size: 1.6rem;
            text-align: center;
        }
        .status p {
            flex: 1 1 200px;
            margin: 5px;
        }
        .status span {
            background: black;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-block;
            border: 2px solid #ffaa33;
            color: #ffd966;
            font-weight: bold;
            min-width: 120px;
        }
        #countdown {
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            background: #1f0000;
            color: #ff7b7b;
            border-color: #ff4444;
            box-shadow: 0 0 20px red;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 30px 0 20px;
        }
        button {
            flex: 1 1 140px;
            padding: 18px 12px;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            border: none;
            border-radius: 60px;
            background: #354e4a;
            color: #b0ffe0;
            border: 3px solid #7fcbc0;
            box-shadow: 0 5px 0 #1a322e, 0 8px 18px black;
            cursor: pointer;
            transition: all 0.08s linear;
            letter-spacing: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1a322e, 0 8px 18px black;
        }
        button:disabled {
            opacity: 0.5;
            transform: translateY(0);
            box-shadow: 0 3px 0 #1a322e;
            pointer-events: none;
            filter: grayscale(40%);
        }
        .danger {
            background: #b32f2f;
            border-color: #ff9f9f;
            color: #fff2b0;
            text-shadow: 0 0 15px orange;
            box-shadow: 0 5px 0 #631111, 0 8px 18px black;
        }
        .danger#detonate {
            background: #d64203;
            border-color: #ffc285;
            color: #fff9e6;
            font-size: 1.8rem;
        }
        #abort {
            background: #665511;
            border-color: #eedd88;
            color: #ffefb0;
        }
        #reset {
            background: #2f4f5f;
            border-color: #98d9e9;
        }

        #explosion-area {
            min-height: 130px;
            text-align: center;
            font-size: 4.5rem;
            line-height: 1.3;
            padding: 15px;
            background: #10231f;
            border-radius: 60px;
            border: 3px dashed #ffb86b;
            margin-top: 20px;
            transition: background 0.3s;
            word-break: break-word;
        }
        .exploded-bg {
            background: #511800 !important;
            border-color: #ffb26b !important;
            box-shadow: 0 0 80px #ff8c42;
        }
        .mushroom {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px orange);
            animation: rise 1.2s ease-out;
        }
        @keyframes rise {
            0% { transform: scale(0.2) translateY(40px); opacity: 0; }
            70% { transform: scale(1.1) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); }
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 1.1rem;
            color: #5f9d92;
            border-top: 1px solid #3e7068;
            padding-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>☢️ HYDROGEN BOMB SIMULATOR 3000 ☢️</h1>
        <div class="panel">
            <!-- Yield slider -->
            <div class="yield-selector">
                <label>⚡ Yield (Megatons): <span id="yield-value">50</span> MT</label>
                <input type="range" id="yield-slider" min="1" max="100" value="50" step="1">
            </div>

            <!-- Target selector -->
            <div class="target-selector">
                <label>🎯 Target:</label>
                <select id="target">
                    <option>Nova York</option>
                    <option>Moscou</option>
                    <option>Londres</option>
                    <option>Tóquio</option>
                    <option>Sua Cidade</option>
                    <option>Meio do Oceano</option>
                    <option>Área 51</option>
                </select>
            </div>

            <!-- Status panel -->
            <div class="status">
                <p>🔴 STATUS: <span id="status-text">ARMED</span></p>
                <p>⏳ CONTAGEM: <span id="countdown">---</span></p>
            </div>

            <!-- Main buttons -->
            <div class="buttons">
                <button class="danger" id="detonate">💥 DETONAR</button>
                <button id="abort" disabled>🛑 ABORTAR</button>
                <button id="reset">↻ REINICIAR</button>
            </div>

            <!-- Explosion display area -->
            <div id="explosion-area">
                <span class="placeholder">[ AGUARDANDO DETONAÇÃO ]</span>
            </div>
        </div>

        <footer>⚠️ APENAS SIMULAÇÃO • NÃO TENTE ISSO EM CASA ☢️</footer>
    </div>

    <script>
        (function() {
            // Elementos do DOM
            const bodyEl = document.body;
            const container = document.getElementById('mainContainer');
            const yieldSlider = document.getElementById('yield-slider');
            const yieldSpan = document.getElementById('yield-value');
            const targetSelect = document.getElementById('target');
            const statusText = document.getElementById('status-text');
            const countdownSpan = document.getElementById('countdown');
            const detonateBtn = document.getElementById('detonate');
            const abortBtn = document.getElementById('abort');
            const resetBtn = document.getElementById('reset');
            const explosionDiv = document.getElementById('explosion-area');

            // Variáveis de estado
            let currentState = 'idle';          // idle, countdown, exploded
            let countdownInterval = null;
            let countdownValue = 5;              // segundos
            const DEFAULT_COUNTDOWN = 5;

            // Atualiza display do yield
            yieldSlider.addEventListener('input', function() {
                yieldSpan.textContent = this.value;
            });

            // Funções de controle

            // Para completamente qualquer contagem e limpa intervalos
            function clearCountdownTimer() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
            }

            // Reseta para o estado inicial (armado, sem explosão)
            function resetToArmed() {
                clearCountdownTimer();

                currentState = 'idle';
                statusText.textContent = 'ARMED';
                countdownSpan.textContent = '---';
                detonateBtn.disabled = false;
                abortBtn.disabled = true;

                // Remove efeito de flash
                bodyEl.classList.remove('explode-flash');
                // Remove classe de explosão na área
                explosionDiv.classList.remove('exploded-bg');
                // Conteúdo padrão
                explosionDiv.innerHTML = '<span class="placeholder">[ AGUARDANDO DETONAÇÃO ]</span>';

                // Habilita slider/select (podem ser usados normalmente)
                yieldSlider.disabled = false;
                targetSelect.disabled = false;
            }

            // Inicia a contagem regressiva (chamado pelo botão DETONAR)
            function startCountdown() {
                if (currentState !== 'idle') return;

                // Pega um pequeno "delay" baseado no yield? (só por diversão: 3 a 7 seg)
                let yieldVal = parseInt(yieldSlider.value, 10);
                // Quanto maior o yield, maior a contagem (respeitando o limite de 10s)
                let countdownTime = Math.min(8, Math.max(3, Math.floor(yieldVal / 15) + 3));
                countdownValue = countdownTime;

                currentState = 'countdown';
                statusText.textContent = 'CONTAGEM';
                countdownSpan.textContent = countdownValue;

                detonateBtn.disabled = true;
                abortBtn.disabled = false;
                yieldSlider.disabled = true;      // bloqueia mudanças durante contagem/explosão
                targetSelect.disabled = true;

                // Inicia o intervalo
                countdownInterval = setInterval(() => {
                    countdownValue -= 1;
                    countdownSpan.textContent = countdownValue;

                    if (countdownValue <= 0) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        triggerExplosion();
                    }
                }, 1000);
            }

            // Aciona a explosão
            function triggerExplosion() {
                // Se já explodiu ou não está em contagem, ignora (segurança)
                if (currentState !== 'countdown') return;

                currentState = 'exploded';
                statusText.textContent = '💥 DETONADO 💥';
                countdownSpan.textContent = '0';

                detonateBtn.disabled = true;
                abortBtn.disabled = true;    // abort não funciona mais
                // yield e select continuam desabilitados

                // Adiciona flash no body
                bodyEl.classList.add('explode-flash');

                // Pega o alvo selecionado
                const target = targetSelect.options[targetSelect.selectedIndex].text;

                // Monta a exibição da explosão (mushroom cloud + mensagem)
                explosionDiv.classList.add('exploded-bg');
                explosionDiv.innerHTML = `
                    <div class="mushroom">☢️💥☁️💥☢️</div>
                    <div style="font-size: 2rem; color: #ffbb33; text-shadow: 0 0 20px red; margin-top: 5px;">
                        💢 ${target} FOI VAPORIZADO(A)! 💢
                    </div>
                    <div style="font-size: 1.3rem; margin-top: 10px; color: orange;">
                        ⚡ Rendimento: ${yieldSlider.value} Megatons ⚡
                    </div>
                `;

                // Remove o flash após alguns segundos (mas mantém a explosão)
                setTimeout(() => {
                    bodyEl.classList.remove('explode-flash');
                }, 1200);
            }

            // Aborta a contagem
            function abortCountdown() {
                if (currentState !== 'countdown') return;
                clearCountdownTimer();

                currentState = 'idle';
                statusText.textContent = 'ABORTADO';
                countdownSpan.textContent = '---';

                detonateBtn.disabled = false;
                abortBtn.disabled = true;
                yieldSlider.disabled = false;
                targetSelect.disabled = false;

                // Nenhuma explosão, só volta ao normal
                explosionDiv.classList.remove('exploded-bg');
                explosionDiv.innerHTML = '<span class="placeholder">[ DETONAÇÃO ABORTADA ]</span>';

                // Remove qualquer flash residual
                bodyEl.classList.remove('explode-flash');
            }

            // Listeners dos botões
            detonateBtn.addEventListener('click', function() {
                // Se não estiver idle, não faz nada (mas o botão está desabilitado em outros estados, segurança)
                if (currentState === 'idle') {
                    startCountdown();
                }
            });

            abortBtn.addEventListener('click', function() {
                if (currentState === 'countdown') {
                    abortCountdown();
                }
            });

            resetBtn.addEventListener('click', function() {
                resetToArmed();
                // yield e select já foram reabilitados no reset, mas o slider mantém o valor
                // sincroniza o span do yield
                yieldSpan.textContent = yieldSlider.value;
            });

            // Sincroniza o span do yield quando mudar manualmente mesmo depois de reset
            yieldSlider.addEventListener('change', function() {
                yieldSpan.textContent = this.value;
            });

            // Inicializa estado
            resetToArmed();

            // Extra: impede double-click selecionar texto nos botões (opcional)
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('mousedown', e => e.preventDefault());
            });

        })();
    </script>
</body>
</html>
