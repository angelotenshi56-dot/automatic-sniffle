<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☢️ HYDROGEN BOMB SIMULATOR 3000 ☢️ (3D)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1219;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .simulator {
            max-width: 1100px;
            width: 100%;
            background: linear-gradient(145deg, #1c2f32 0%, #0f2124 100%);
            border: 6px solid #4e7b7f;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px #2c6b6b;
        }

        h1 {
            text-align: center;
            color: #ffcf8a;
            text-shadow: 0 0 15px #ff8c00, 0 0 30px #ff5700;
            font-size: 2.5rem;
            letter-spacing: 6px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffa74f;
            padding-bottom: 12px;
        }

        /* Área 3D */
        .viewport {
            background: #030e0e;
            border-radius: 30px;
            border: 4px solid #3b8f8c;
            padding: 10px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 40px #000000, 0 10px 20px black;
        }

        #canvas-container {
            width: 100%;
            height: 400px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at 30% 30%, #1a4a4a, #031010);
        }

        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #18302d;
            border: 4px solid #3f948b;
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px black;
        }

        .control {
            background: #1e3d3a;
            padding: 15px 20px;
            border-radius: 50px;
            border: 2px solid #5eb9ae;
        }

        .control label {
            font-size: 1.5rem;
            color: #ffdcaa;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 0 5px #ffb347;
        }

        #yield-value {
            background: black;
            color: #adff2f;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
        }

        input[type=range] {
            width: 100%;
            margin: 10px 0;
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 20px;
            background: #0f2a27;
            border: 2px solid #57b5a8;
            border-radius: 20px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 34px;
            width: 34px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc66, #ff9900);
            border: 3px solid #ffffc0;
            margin-top: -8px;
            box-shadow: 0 0 20px #ffaa33;
            cursor: grab;
        }

        select {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.5rem;
            background: #03100e;
            color: #a2f2d9;
            border: 3px solid #7fe0d0;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .digital-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0e2622;
            border-radius: 40px;
            border: 3px solid #61bdb0;
            padding: 10px;
        }

        .digital-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 1.8rem;
            margin: 8px 0;
        }

        .digital-row span {
            background: black;
            padding: 10px 25px;
            border-radius: 40px;
            border: 2px solid #ffaa33;
            color: #ffdb8e;
            font-weight: bold;
        }

        #countdown {
            color: #ff7b7b;
            border-color: #ff4444;
            box-shadow: 0 0 15px red;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0 20px;
        }

        button {
            flex: 1 1 160px;
            padding: 18px 12px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            background: #2c504a;
            border: 3px solid #7fcbc0;
            color: #e0ffe0;
            border-radius: 60px;
            box-shadow: 0 5px 0 #1d3632, 0 8px 18px black;
            cursor: pointer;
            transition: 0.05s linear;
            letter-spacing: 2px;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1d3632, 0 8px 18px black;
        }
        button:disabled {
            opacity: 0.5;
            transform: translateY(0);
            pointer-events: none;
        }
        #detonate {
            background: #c03d00;
            border-color: #ffae70;
            color: #fff3c9;
            box-shadow: 0 5px 0 #6a2100, 0 8px 18px black;
        }
        #abort {
            background: #7f6b22;
            border-color: #eedd88;
        }

        .message-area {
            background: #102622;
            border-radius: 40px;
            border: 3px dashed #ffae42;
            padding: 20px;
            text-align: center;
            font-size: 2rem;
            color: #ffd58c;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px black;
        }

        footer {
            margin-top: 20px;
            text-align: center;
            color: #3e7a70;
            font-size: 1.2rem;
            border-top: 1px solid #3e7068;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="simulator">
        <h1>☢️ H-BOMB 3000 ☢️</h1>

        <!-- Container 3D -->
        <div class="viewport">
            <div id="canvas-container"></div>
        </div>

        <!-- Painéis de controle -->
        <div class="status-panel">
            <div class="control">
                <label>⚡ Yield: <span id="yield-value">50</span> MT</label>
                <input type="range" id="yield-slider" min="1" max="100" value="50" step="1">
            </div>
            <div class="control">
                <label>🎯 Target</label>
                <select id="target">
                    <option>Nova York</option>
                    <option>Moscou</option>
                    <option>Londres</option>
                    <option>Tóquio</option>
                    <option>Sua Cidade</option>
                    <option>Meio do Oceano</option>
                    <option>Área 51</option>
                </select>
            </div>
            <div class="digital-row">
                <span>🔴 STATUS</span>
                <span id="status-text">ARMED</span>
            </div>
            <div class="digital-row">
                <span>⏳ CONTAGEM</span>
                <span id="countdown">---</span>
            </div>
        </div>

        <!-- Botões -->
        <div class="action-buttons">
            <button id="detonate">💥 DETONAR</button>
            <button id="abort" disabled>🛑 ABORTAR</button>
            <button id="reset">↻ REINICIAR</button>
        </div>

        <!-- Área de mensagem (substitui a antiga explosion-area) -->
        <div id="message-area" class="message-area">
            [ AGUARDANDO DETONAÇÃO ]
        </div>

        <footer>⚠️ SIMULAÇÃO FICTÍCIA • NÃO TENTE ISSO EM CASA ☢️</footer>
    </div>

    <!-- Three.js via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // ==================== MÓDULO THREE.JS ====================
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- Configuração da cena ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1a1a);
        // Neblina leve
        scene.fog = new THREE.Fog(0x0a1a1a, 10, 30);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true; // para efeito legal
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Controles para órbita (opcional, dá liberdade)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2; // não deixar ir abaixo do chão

        // Iluminação
        // Luz ambiente
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal (sol)
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 10;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);

        // Luz de preenchimento
        const fillLight = new THREE.PointLight(0x446688, 0.8);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);

        // Um chão simples para reflexo/sombra
        const planeGeometry = new THREE.CircleGeometry(10, 32);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x1a3a3a, roughness: 0.4, metalness: 0.1, emissive: 0x021010 });
        const ground = new THREE.Mesh(planeGeometry, planeMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1.2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grade decorativa
        const gridHelper = new THREE.GridHelper(15, 20, 0x77bbaa, 0x336666);
        gridHelper.position.y = -1.19;
        scene.add(gridHelper);

        // --- Construção da bomba (grupo) ---
        const bombGroup = new THREE.Group();

        // Corpo principal (ogiva)
        const bodyGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.2, metalness: 0.9, emissive: 0x000022 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.2;
        bombGroup.add(body);

        // Anel equatorial (detalhe)
        const ringGeo = new THREE.TorusGeometry(1.35, 0.08, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, roughness: 0.3, metalness: 0.7, emissive: 0x331100 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.rotation.z = 0.2;
        ring.position.y = 0.2;
        ring.castShadow = true;
        bombGroup.add(ring);

        // Segundo anel menor
        const ring2Geo = new THREE.TorusGeometry(1.0, 0.06, 16, 48);
        const ring2Mat = new THREE.MeshStandardMaterial({ color: 0xddbb88, roughness: 0.4, metalness: 0.5 });
        const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
        ring2.rotation.x = Math.PI / 2;
        ring2.rotation.z = -0.3;
        ring2.position.y = 0.7;
        ring2.castShadow = true;
        bombGroup.add(ring2);

        // Cone do nariz (parte superior)
        const noseGeo = new THREE.ConeGeometry(0.9, 1.2, 16);
        const noseMat = new THREE.MeshStandardMaterial({ color: 0xeeeeff, roughness: 0.15, metalness: 0.95, emissive: 0x111133 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.y = 1.5;
        nose.castShadow = true;
        nose.receiveShadow = true;
        bombGroup.add(nose);

        // Aletas (4 cones)
        const finMat = new THREE.MeshStandardMaterial({ color: 0x99aabb, roughness: 0.3, metalness: 0.8 });
        for (let i = 0; i < 4; i++) {
            const finGeo = new THREE.ConeGeometry(0.4, 1.0, 8);
            const fin = new THREE.Mesh(finGeo, finMat);
            fin.position.y = -0.6;
            fin.position.x = Math.sin(i * Math.PI/2) * 1.2;
            fin.position.z = Math.cos(i * Math.PI/2) * 1.2;
            fin.rotation.z = -0.2;
            fin.rotation.x = 0.3;
            fin.rotation.y = i * Math.PI/2;
            fin.castShadow = true;
            bombGroup.add(fin);
        }

        // Pontos luminosos (simulando LEDs)
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0x441100 });
        const l1 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), lightMat);
        l1.position.set(1.0, 0.7, 1.0);
        bombGroup.add(l1);
        const l2 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), lightMat);
        l2.position.set(-1.0, 0.7, -1.0);
        bombGroup.add(l2);

        scene.add(bombGroup);

        // Partículas de explosão (serão usadas depois)
        const particleCount = 300;
        const particlesGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const colorArray = new Float32Array(particleCount * 3);
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        particles.visible = false;
        scene.add(particles);

        // Estado da bomba no 3D
        let isExploded = false;
        let explosionTime = 0;

        // --- Animação e integração com DOM ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isExploded) {
                // Rotação suave controlada pelo OrbitControls já tem autoRotate
                // Podemos também pulsar levemente os LEDs
                const time = Date.now() * 0.002;
                bombGroup.children.forEach(child => {
                    if (child.material && child.material.emissive) {
                        if (child.material.color.getHex() === 0xff3300) {
                            child.material.emissive.setHSL(0.05, 1, 0.2 + 0.1 * Math.sin(time));
                        }
                    }
                });
            } else {
                // Animação de explosão: partículas se expandem
                const positions = particles.geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    // Expande radialmente
                    const idx = i * 3;
                    const speed = 0.02;
                    positions[idx] += positions[idx] * speed * 0.5; // direção original
                    positions[idx+1] += positions[idx+1] * speed * 0.5;
                    positions[idx+2] += positions[idx+2] * speed * 0.5;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            controls.update(); // para autoRotate
            renderer.render(scene, camera);
        }
        animate();

        // Ajustar resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }

        // --- Funções de controle da bomba 3D ---
        function setYield(value) {
            // Yield escala a bomba (1 a 100 -> escala 0.8 a 2.0)
            const scale = 0.8 + (value / 100) * 1.2;
            bombGroup.scale.set(scale, scale, scale);
        }

        function detonate3D() {
            if (isExploded) return;
            isExploded = true;

            // Esconde a bomba
            bombGroup.visible = false;

            // Ativa partículas
            particles.visible = true;

            // Gera partículas em volta da posição da bomba
            const positions = particles.geometry.attributes.position.array;
            const colors = particles.geometry.attributes.color.array;
            for (let i = 0; i < particleCount; i++) {
                // Direção aleatória
                const r = Math.random() * 2.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                positions[i*3] = x;
                positions[i*3+1] = y + 0.2;
                positions[i*3+2] = z;

                // Cor: laranja/vermelho/amarelo
                const color = new THREE.Color().setHSL(0.05 + Math.random()*0.1, 1, 0.5);
                colors[i*3] = color.r;
                colors[i*3+1] = color.g;
                colors[i*3+2] = color.b;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.color.needsUpdate = true;

            // Muda cor de fundo para tom de fogo
            scene.background.setHex(0x441100);
        }

        function reset3D() {
            isExploded = false;
            bombGroup.visible = true;
            particles.visible = false;
            scene.background.setHex(0x0a1a1a);
            // Reinicia escala conforme yield atual
            const yieldVal = parseInt(document.getElementById('yield-slider').value, 10);
            setYield(yieldVal);
        }

        // ==================== INTEGRAÇÃO COM UI ====================
        // Elementos
        const yieldSlider = document.getElementById('yield-slider');
        const yieldSpan = document.getElementById('yield-value');
        const targetSelect = document.getElementById('target');
        const statusText = document.getElementById('status-text');
        const countdownSpan = document.getElementById('countdown');
        const detonateBtn = document.getElementById('detonate');
        const abortBtn = document.getElementById('abort');
        const resetBtn = document.getElementById('reset');
        const messageArea = document.getElementById('message-area');

        // Variáveis de estado
        let currentState = 'idle'; // idle, countdown, exploded
        let countdownInterval = null;
        let countdownValue = 5;

        // Atualiza yield no texto e no 3D
        yieldSlider.addEventListener('input', function() {
            const val = this.value;
            yieldSpan.textContent = val;
            if (!isExploded) setYield(val);
        });

        function clearCountdownTimer() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
        }

        function resetToArmed() {
            clearCountdownTimer();
            currentState = 'idle';
            statusText.textContent = 'ARMED';
            countdownSpan.textContent = '---';
            detonateBtn.disabled = false;
            abortBtn.disabled = true;
            yieldSlider.disabled = false;
            targetSelect.disabled = false;
            messageArea.innerHTML = '[ AGUARDANDO DETONAÇÃO ]';
            reset3D();
        }

        function startCountdown() {
            if (currentState !== 'idle') return;

            let yieldVal = parseInt(yieldSlider.value, 10);
            let countdownTime = Math.min(8, Math.max(3, Math.floor(yieldVal / 15) + 3));
            countdownValue = countdownTime;

            currentState = 'countdown';
            statusText.textContent = 'CONTAGEM';
            countdownSpan.textContent = countdownValue;

            detonateBtn.disabled = true;
            abortBtn.disabled = false;
            yieldSlider.disabled = true;
            targetSelect.disabled = true;

            countdownInterval = setInterval(() => {
                countdownValue -= 1;
                countdownSpan.textContent = countdownValue;

                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    triggerExplosion();
                }
            }, 1000);
        }

        function triggerExplosion() {
            currentState = 'exploded';
            statusText.textContent = '💥 DETONADO';
            countdownSpan.textContent = '0';
            detonateBtn.disabled = true;
            abortBtn.disabled = true;
            // yield e select continuam desabilitados

            const target = targetSelect.options[targetSelect.selectedIndex].text;
            messageArea.innerHTML = `☢️💥 ${target} FOI VAPORIZADO(A)! 💥☢️<br>⚡ Rendimento: ${yieldSlider.value} Megatons ⚡`;

            // Ativa explosão 3D
            detonate3D();
        }

        function abortCountdown() {
            if (currentState !== 'countdown') return;
            clearCountdownTimer();
            currentState = 'idle';
            statusText.textContent = 'ABORTADO';
            countdownSpan.textContent = '---';
            detonateBtn.disabled = false;
            abortBtn.disabled = true;
            yieldSlider.disabled = false;
            targetSelect.disabled = false;
            messageArea.innerHTML = '[ DETONAÇÃO ABORTADA ]';
            // Volta ao normal no 3D (já estava visível, só garante)
            reset3D(); // na verdade reset3D vai colocar a bomba de volta se necessário, mas não estava explodida
            // Garantir que não está explodida
            if (isExploded) reset3D();
        }

        // Listeners
        detonateBtn.addEventListener('click', startCountdown);
        abortBtn.addEventListener('click', abortCountdown);
        resetBtn.addEventListener('click', function() {
            resetToArmed();
            yieldSpan.textContent = yieldSlider.value;
            setYield(yieldSlider.value);
        });

        // Inicializa escala da bomba
        setYield(yieldSlider.value);

        // Previne seleção de texto nos botões
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', e => e.preventDefault());
        });

    </script>
</body>
</html>
